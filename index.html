<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ザラバ — 日本株ニュース速報</title>
<meta name="description" content="適時開示をAIが要約解説。日本株の朝刊ダイジェストと場中速報タイムライン。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0D14;          /* 夜の板 */
  --surface:#121722;
  --surface-2:#171E2C;
  --line:#222B3C;
  --text:#E9EDF5;
  --sub:#8B94A7;
  --up:#F6465D;          /* 日本式: 値上がり・インパクト大=赤 */
  --mid:#E8A33D;         /* 琥珀: ダイジェスト・注意 */
  --data:#5CC8FF;        /* データ・銘柄コード */
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:"IBM Plex Sans JP",system-ui,sans-serif;
  font-size:15px;line-height:1.75;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:"IBM Plex Mono",monospace}

/* ---------- ヘッダー ---------- */
header{
  position:sticky;top:0;z-index:20;
  background:rgba(10,13,20,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.header-in{
  max-width:720px;margin:0 auto;padding:14px 16px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
}
.masthead{
  font-family:"Shippori Mincho",serif;font-size:22px;letter-spacing:.35em;
  color:var(--text);text-indent:.1em;
}
.masthead small{
  font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.2em;
  color:var(--sub);display:block;margin-top:-2px;
}
.clock{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--sub);text-align:right}
.clock .live{color:var(--up)}

/* ---------- フィルタ ---------- */
.chips{
  max-width:720px;margin:0 auto;padding:12px 16px 4px;
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:none;border:1px solid var(--line);background:var(--surface);
  color:var(--sub);font-size:12.5px;padding:5px 14px;border-radius:999px;
  cursor:pointer;transition:.15s;
}
.chip[aria-pressed="true"]{color:var(--text);border-color:var(--up);background:rgba(246,70,93,.1)}
.chip:focus-visible{outline:2px solid var(--data);outline-offset:2px}

main{max-width:720px;margin:0 auto;padding:12px 16px 80px}

/* ---------- 朝刊ダイジェスト ---------- */
.digest{
  background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--line);border-left:3px solid var(--mid);
  border-radius:var(--radius);padding:18px 18px 16px;margin:10px 0 26px;
}
.digest .eyebrow{
  font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.25em;
  color:var(--mid);margin-bottom:8px;
}
.digest h1{font-size:16.5px;font-weight:700;margin-bottom:10px}
.digest p{color:#C6CDDD;font-size:14px;white-space:pre-wrap}
.digest .meta{margin-top:12px;font-size:11.5px;color:var(--sub)}

/* ---------- タイムライン ---------- */
.tl-head{
  display:flex;align-items:center;gap:10px;margin:0 0 4px 2px;
  font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.25em;color:var(--sub);
}
.tl-head::after{content:"";flex:1;height:1px;background:var(--line)}
.timeline{list-style:none;position:relative;padding-left:64px}
.timeline::before{
  content:"";position:absolute;left:52px;top:8px;bottom:8px;width:1px;background:var(--line);
}
.item{position:relative;padding:14px 0}
.item .time{
  position:absolute;left:-64px;top:18px;width:44px;text-align:right;
  font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--sub);
}
.item .dot{
  position:absolute;left:-15px;top:23px;width:7px;height:7px;border-radius:50%;
  background:var(--sub);
}
.item[data-impact="high"] .dot{background:var(--up);box-shadow:0 0 0 4px rgba(246,70,93,.15)}
.item:first-child[data-impact="high"] .dot{animation:pulse 2s infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(246,70,93,.45)}
  70%{box-shadow:0 0 0 9px rgba(246,70,93,0)}
  100%{box-shadow:0 0 0 0 rgba(246,70,93,0)}
}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;transition:border-color .15s;
}
.card:hover{border-color:#324159}
.tag-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.code{
  font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--data);
  background:rgba(92,200,255,.08);padding:1px 7px;border-radius:4px;
}
.company{font-weight:700;font-size:14.5px}
.badge{
  font-size:10.5px;font-weight:700;letter-spacing:.1em;
  padding:2px 8px;border-radius:4px;
}
.badge.high{color:var(--up);background:rgba(246,70,93,.12)}
.badge.mid{color:var(--mid);background:rgba(232,163,61,.12)}
.title{font-size:13px;color:var(--sub);margin-bottom:8px}
.summary{font-size:14px;color:#D7DDEA;white-space:pre-wrap}
.card a{
  display:inline-block;margin-top:10px;font-size:12px;color:var(--data);
  text-decoration:none;border-bottom:1px solid rgba(92,200,255,.3);
}
.card a:hover{border-bottom-color:var(--data)}
.card a:focus-visible{outline:2px solid var(--data);outline-offset:2px}

/* ---------- 空・エラー ---------- */
.notice{
  text-align:center;color:var(--sub);font-size:13.5px;
  padding:48px 16px;border:1px dashed var(--line);border-radius:var(--radius);
}
footer{
  max-width:720px;margin:0 auto;padding:24px 16px 40px;
  font-size:11.5px;color:var(--sub);border-top:1px solid var(--line);
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  html{scroll-behavior:auto}
}
@media (min-width:640px){
  body{font-size:15.5px}
  .masthead{font-size:25px}
}
</style>
</head>
<body>

<header>
  <div class="header-in">
    <div class="masthead">ザラバ<small>ZARABA — JP EQUITY WIRE</small></div>
    <div class="clock mono"><span class="live">●</span> <span id="clock">--:--:--</span> JST<br><span id="today"></span></div>
  </div>
</header>

<nav class="chips" aria-label="絞り込み">
  <button class="chip" aria-pressed="true"  data-filter="all">すべて</button>
  <button class="chip" aria-pressed="false" data-filter="high">インパクト大</button>
  <button class="chip" aria-pressed="false" data-filter="earnings">業績修正</button>
  <button class="chip" aria-pressed="false" data-filter="deal">TOB・提携</button>
  <button class="chip" aria-pressed="false" data-filter="return">還元・分割</button>
</nav>

<main>
  <section class="digest" id="digest" hidden>
    <div class="eyebrow">MORNING DIGEST ── 朝刊</div>
    <h1 id="digest-title"></h1>
    <p id="digest-body"></p>
    <div class="meta" id="digest-meta"></div>
  </section>

  <div class="tl-head">ZARABA TIMELINE ── 場中速報</div>
  <ol class="timeline" id="timeline"></ol>
  <div class="notice" id="notice" hidden></div>
</main>

<footer>
  出典: TDnet適時開示。解説はAIによる自動生成で、事実は各開示原文をご確認ください。
  本サイトは情報提供のみを目的とし、投資勧誘・売買推奨を行うものではありません。
</footer>

<script>
/* ================= 設定 =================
   GASをWebアプリとしてデプロイしたURLを設定。
   未設定("")の間はサンプルデータでプレビュー表示します。 */
const API_URL = "https://script.google.com/macros/s/AKfycbwQKAI3QM4YLl5EHEudqC56sv61bVTQRFO99JszlAEb1ntJBnvxapx-MHP4-drW1x5z4Q/exec";

/* ---------- サンプルデータ(プレビュー用) ---------- */
const SAMPLE = {
  digest: {
    date: "7月7日(火)",
    title: "決算修正が相次ぐ、半導体関連に資金流入",
    body: "前日引け後は業績上方修正の開示が目立ち、円安進行を追い風に輸出関連の採算改善が相次いだ。半導体製造装置の受注回復を示す開示もあり、本日はハイテク主導の展開となりそうだ。\n\n・サンプル電機(6501) 通期営業益を12%上方修正。円安と北米データセンター向けが牽引したとみられる。\n・テスト商事(8001) 500億円を上限とする自己株式取得を発表。発行済株式の3.2%に相当し、需給の下支え要因。\n・デモ製薬(4502) 米社と抗がん剤領域で業務提携。開発費負担の軽減が中期的な利益率改善につながるとみられる。",
    count: 34
  },
  items: [
    {time:"14:32", code:"6501", company:"サンプル電機", impact:"high", cat:"earnings",
     title:"2027年3月期 通期連結業績予想の上方修正に関するお知らせ",
     summary:"①通期営業利益を従来比12%引き上げ ②市場コンセンサスを上回る水準で、引け後にかけ買い材料視されやすい ③円安と北米向けサーバー部材の需要増が背景とみられる。",
     url:"#"},
    {time:"13:05", code:"8001", company:"テスト商事", impact:"high", cat:"return",
     title:"自己株式の取得に係る事項の決定に関するお知らせ",
     summary:"①上限500億円・発行済株式の3.2%の自社株買いを決議 ②1株利益の押し上げと需給改善で株価にプラス ③資源高で積み上がった手元資金の還元強化の一環とみられる。",
     url:"#"},
    {time:"11:48", code:"4502", company:"デモ製薬", impact:"mid", cat:"deal",
     title:"米バイオ企業との業務提携契約締結に関するお知らせ",
     summary:"①抗がん剤領域で共同開発契約を締結 ②短期の業績影響は限定的だがパイプライン評価の見直し余地 ③特許切れを見据えた後続候補の確保が狙いとみられる。",
     url:"#"},
    {time:"10:20", code:"7203", company:"サンプル自動車", impact:"mid", cat:"earnings",
     title:"月次生産・販売実績(6月)に関するお知らせ",
     summary:"①世界生産が前年比+8%と3カ月連続プラス ②北米在庫の正常化が確認されれば通期計画の上振れ観測につながる ③半導体調達の改善が寄与したとみられる。",
     url:"#"}
  ]
};

/* ---------- 時計 ---------- */
function tick(){
  const d = new Date();
  document.getElementById("clock").textContent =
    d.toLocaleTimeString("ja-JP",{hour12:false,timeZone:"Asia/Tokyo"});
  document.getElementById("today").textContent =
    d.toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",weekday:"short",timeZone:"Asia/Tokyo"});
}
tick(); setInterval(tick,1000);

/* ---------- 描画 ---------- */
let DATA = null;

function render(filter){
  const tl = document.getElementById("timeline");
  const notice = document.getElementById("notice");
  tl.innerHTML = "";

  const items = DATA.items.filter(it =>
    filter === "all" ? true :
    filter === "high" ? it.impact === "high" : it.cat === filter
  );

  if(items.length === 0){
    notice.hidden = false;
    notice.textContent = "この条件の速報はまだありません。開示が出しだい、ここに流れます。";
    return;
  }
  notice.hidden = true;

  for(const it of items){
    const li = document.createElement("li");
    li.className = "item";
    li.dataset.impact = it.impact;
    li.innerHTML = `
      <span class="time mono">${esc(it.time)}</span>
      <span class="dot" aria-hidden="true"></span>
      <article class="card">
        <div class="tag-row">
          <span class="code">${esc(it.code)}</span>
          <span class="company">${esc(it.company)}</span>
          <span class="badge ${it.impact === "high" ? "high" : "mid"}">
            ${it.impact === "high" ? "インパクト大" : "注目"}</span>
        </div>
        <div class="title">${esc(it.title)}</div>
        <div class="summary">${esc(it.summary)}</div>
        ${it.url ? `<a href="${esc(it.url)}" target="_blank" rel="noopener">開示原文を読む →</a>` : ""}
      </article>`;
    tl.appendChild(li);
  }
}

function renderDigest(){
  const d = DATA.digest;
  if(!d) return;
  const sec = document.getElementById("digest");
  sec.hidden = false;
  document.getElementById("digest-title").textContent = d.title || `${d.date} の注目開示`;
  document.getElementById("digest-body").textContent = d.body || "";
  document.getElementById("digest-meta").textContent =
    `${d.date} 8:30配信 / 対象開示 ${d.count}件`;
}

function esc(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ---------- フィルタ ---------- */
document.querySelector(".chips").addEventListener("click", e=>{
  const btn = e.target.closest(".chip");
  if(!btn) return;
  document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed","false"));
  btn.setAttribute("aria-pressed","true");
  render(btn.dataset.filter);
});

/* ---------- 起動 ---------- */
async function boot(){
  if(API_URL){
    try{
      const res = await fetch(API_URL);
      DATA = await res.json();
    }catch(e){
      DATA = SAMPLE;
    }
  }else{
    DATA = SAMPLE;
  }
  renderDigest();
  render("all");
}
boot();
</script>
</body>
</html>
