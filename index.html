<style>
:root{
  --bg:#0A0D14;          /* 夜の板 */
  --surface:#121722;
  --surface-2:#171E2C;
  --line:#222B3C;
  --text:#E9EDF5;
  --sub:#8B94A7;
  --up:#F6465D;          /* 日本式: 値上がり・インパクト大=赤 */
  --down:#2EBD85;        /* 値下がり=緑 */
  --mid:#E8A33D;         /* 琥珀: ダイジェスト・注意 */
  --data:#5CC8FF;        /* データ・銘柄コード */
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:"IBM Plex Sans JP",system-ui,sans-serif;
  font-size:15px;line-height:1.75;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:"IBM Plex Mono",monospace}

/* ---------- ヘッダー ---------- */
header{
  position:sticky;top:0;z-index:20;
  background:rgba(10,13,20,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.header-in{
  max-width:720px;margin:0 auto;padding:14px 16px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
}
.masthead{
  font-family:"Shippori Mincho",serif;font-size:22px;letter-spacing:.35em;
  color:var(--text);text-indent:.1em;cursor:pointer;
}
.masthead small{
  font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.2em;
  color:var(--sub);display:block;margin-top:-2px;
}
.clock{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--sub);text-align:right}
.clock .live{color:var(--up)}

/* ---------- フィルタ ---------- */
.chips{
  max-width:720px;margin:0 auto;padding:12px 16px 4px;
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:none;border:1px solid var(--line);background:var(--surface);
  color:var(--sub);font-size:12.5px;padding:5px 14px;border-radius:999px;
  cursor:pointer;transition:.15s;
}
.chip[aria-pressed="true"]{color:var(--text);border-color:var(--up);background:rgba(246,70,93,.1)}
.chip:focus-visible{outline:2px solid var(--data);outline-offset:2px}

main{max-width:720px;margin:0 auto;padding:12px 16px 80px}

/* ---------- 朝刊ダイジェスト ---------- */
.digest{
  background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--line);border-left:3px solid var(--mid);
  border-radius:var(--radius);padding:18px 18px 16px;margin:10px 0 26px;
}
.digest .eyebrow{
  font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.25em;
  color:var(--mid);margin-bottom:8px;
}
.digest h1{font-size:16.5px;font-weight:700;margin-bottom:10px}
.digest p{color:#C6CDDD;font-size:14px;white-space:pre-wrap}
.digest .meta{margin-top:12px;font-size:11.5px;color:var(--sub)}

/* 本日の予定 / 答え合わせ(ダイジェスト内サブブロック) */
.subblock{
  margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);
}
.subblock .sb-head{
  font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.25em;
  color:var(--sub);margin-bottom:6px;
}
.subblock ul{list-style:none}
.subblock li{
  font-size:13px;color:#C6CDDD;padding:2px 0;
  display:flex;gap:8px;align-items:baseline;
}
.ev-dot{flex:none;width:5px;height:5px;border-radius:50%;background:var(--mid);position:relative;top:-2px}
.ev-dot.boj{background:var(--up)} .ev-dot.fomc,.ev-dot.cpi{background:var(--data)}
.ev-dot.sq{background:var(--mid)} .ev-dot.earnings{background:var(--sub)}
.ans-pct{font-family:"IBM Plex Mono",monospace;font-size:13px;min-width:64px;text-align:right}
.ans-pct.pos{color:var(--up)} .ans-pct.neg{color:var(--down)} .ans-pct.na{color:var(--sub)}
.ans-name{cursor:pointer}
.ans-name:hover{color:var(--data)}

/* ---------- タイムライン ---------- */
.tl-head{
  display:flex;align-items:center;gap:10px;margin:0 0 4px 2px;
  font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.25em;color:var(--sub);
}
.tl-head::after{content:"";flex:1;height:1px;background:var(--line)}
.timeline{list-style:none;position:relative;padding-left:64px}
.timeline::before{
  content:"";position:absolute;left:52px;top:8px;bottom:8px;width:1px;background:var(--line);
}
.item{position:relative;padding:14px 0}
.item .time{
  position:absolute;left:-64px;top:18px;width:44px;text-align:right;
  font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--sub);line-height:1.4;
}
.item .dot{
  position:absolute;left:-15px;top:23px;width:7px;height:7px;border-radius:50%;
  background:var(--sub);
}
.item[data-impact="high"] .dot{background:var(--up);box-shadow:0 0 0 4px rgba(246,70,93,.15)}
.item:first-child[data-impact="high"] .dot{animation:pulse 2s infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(246,70,93,.45)}
  70%{box-shadow:0 0 0 9px rgba(246,70,93,0)}
  100%{box-shadow:0 0 0 0 rgba(246,70,93,0)}
}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;transition:border-color .15s;
}
.card:hover{border-color:#324159}
.tag-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.code{
  font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--data);
  background:rgba(92,200,255,.08);padding:1px 7px;border-radius:4px;
  cursor:pointer;border:none;
}
.code:hover{background:rgba(92,200,255,.18)}
.code:focus-visible{outline:2px solid var(--data);outline-offset:2px}
.company{font-weight:700;font-size:14.5px}
.badge{
  font-size:10.5px;font-weight:700;letter-spacing:.1em;
  padding:2px 8px;border-radius:4px;
}
.badge.high{color:var(--up);background:rgba(246,70,93,.12)}
.badge.mid{color:var(--mid);background:rgba(232,163,61,.12)}
.badge.holding{color:var(--data);background:rgba(92,200,255,.1)}
.rev{

  padding:2px 8px;border-radius:4px;letter-spacing:0;
}
.rev.pos{color:var(--up);background:rgba(246,70,93,.08)}
.rev.neg{color:var(--down);background:rgba(46,189,133,.08)}
.title{font-size:13px;color:var(--sub);margin-bottom:8px}
.summary{font-size:14px;color:#D7DDEA;white-space:pre-wrap}
.card a{
  display:inline-block;margin-top:10px;font-size:12px;color:var(--data);
  text-decoration:none;border-bottom:1px solid rgba(92,200,255,.3);
}
.card a:hover{border-bottom-color:var(--data)}
.card a:focus-visible{outline:2px solid var(--data);outline-offset:2px}

/* ---------- 銘柄ページ ---------- */
.stock-head{
  background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--line);border-left:3px solid var(--data);
  border-radius:var(--radius);padding:18px;margin:10px 0 22px;

.stock-head .back{
  display:inline-block;font-size:12px;color:var(--sub);text-decoration:none;

.stock-head .back:hover{color:var(--data)}
.stock-head .st-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.stock-head .st-code{
  font-family:"IBM Plex Mono",monospace;font-size:15px;color:var(--data);
  background:rgba(92,200,255,.08);padding:2px 10px;border-radius:5px;
}
.stock-head h1{font-size:19px;font-weight:700}
.context-line{
  margin-top:10px;font-size:13px;color:var(--mid);
  display:flex;gap:8px;align-items:baseline;
}
.context-line::before{content:"◆";font-size:10px}
.stock-stats{margin-top:8px;font-size:12px;color:var(--sub)}

.supply-demand{
  margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);
  display:grid;gap:4px;
}
.sd-head{
  font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.25em;
  color:var(--sub);margin-bottom:2px;

.sd-row{display:flex;gap:10px;font-size:12.5px;color:#C6CDDD;align-items:baseline;flex-wrap:wrap}
.sd-label{color:var(--sub);min-width:88px;font-size:12px}
.sd-val{font-family:"IBM Plex Mono",monospace}
.sd-val .delta{font-size:11px;margin-left:6px}
.sd-val .delta.pos{color:var(--up)} .sd-val .delta.neg{color:var(--down)}
.sd-short-name{font-size:12px;color:#C6CDDD}

.notice{
  text-align:center;color:var(--sub);font-size:13.5px;
  padding:48px 16px;border:1px dashed var(--line);border-radius:var(--radius);
}
footer{
  max-width:720px;margin:0 auto;padding:24px 16px 40px;
  font-size:11.5px;color:var(--sub);border-top:1px solid var(--line);
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  html{scroll-behavior:auto}
}
@media (min-width:640px){
  body{font-size:15.5px}
  .masthead{font-size:25px}
}

/* ---------- 時計 ---------- */
function tick(){

    d.toLocaleTimeString("ja-JP",{hour12:false,timeZone:"Asia/Tokyo"});
  document.getElementById("today").textContent =
    d.toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",weekday:"short",timeZone:"Asia/Tokyo"});
}

/* ---------- 共通描画部品 ---------- */
function esc(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function revBadge(it){
  if(!it.revText) return "";
  const cls = (it.revPct != null && it.revPct < 0) ? "neg" : "pos";
  return `<span class="rev ${cls}">${esc(it.revText)}</span>`;
}

      <div class="tag-row">
        <button class="code" data-code="${esc(it.code)}" aria-label="${esc(it.company)}の銘柄ページ">${esc(it.code)}</button>
        <span class="company">${esc(it.company)}</span>
        <span class="badge ${badgeCls}">${badgeTxt}</span>
        ${isHolding ? `<span class="badge holding">5%ルール</span>` : ""}
        ${revBadge(it)}
      </div>
      <div class="title">${esc(it.title)}</div>
      <div class="summary">${esc(it.summary)}</div>
      ${it.url && it.url !== "#" ? `<a href="${esc(it.url)}" target="_blank" rel="noopener">開示原文を読む →</a>` : ""}
    </article>`;
}

function renderList(listEl, noticeEl, items, emptyMsg){
  listEl.innerHTML = "";
  if(items.length === 0){
    noticeEl.hidden = false;
    noticeEl.textContent = emptyMsg;
    return;
  }
  noticeEl.hidden = true;
  for(const it of items){
    const li = document.createElement("li");
    li.className = "item";
    li.dataset.impact = it.impact;
    li.innerHTML = itemHtml(it);
    listEl.appendChild(li);
  }
}

/* ---------- ホーム描画 ---------- */
let DATA = null;
let currentFilter = "all";

function render(filter){
  currentFilter = filter;
  const items = (DATA.items || []).filter(it =>
    filter === "all" ? true :
    filter === "high" ? it.impact === "high" : it.cat === filter
  );
  renderList(
    document.getElementById("timeline"),
    document.getElementById("notice"),
    items,
    "この条件の速報はまだありません。開示が出しだい、ここに流れます。"
  );
}

function renderDigest(){
  const d = DATA.digest;
  if(!d) return;
  const sec = document.getElementById("digest");
  sec.hidden = false;
  document.getElementById("digest-title").textContent = d.title || `${d.date} の注目開示`;
  document.getElementById("digest-body").textContent = d.body || "";
  document.getElementById("digest-meta").textContent =
    `${d.date} 8:30配信 / 対象開示 ${d.count}件`;

  // 本日の予定
  const evBlock = document.getElementById("events-block");
  const evList = document.getElementById("events-list");
  evList.innerHTML = "";
  if(d.events && d.events.length){
    evBlock.hidden = false;
    for(const ev of d.events){
      const li = document.createElement("li");
      li.innerHTML = `<span class="ev-dot ${esc(ev.type||"")}" aria-hidden="true"></span><span>${esc(ev.label)}</span>`;
      evList.appendChild(li);
    }
  }else{
    evBlock.hidden = true;
  }

  // 昨日の答え合わせ
  const anBlock = document.getElementById("answers-block");
  const anList = document.getElementById("answers-list");
  anList.innerHTML = "";
  if(d.answers && d.answers.length){
    anBlock.hidden = false;
    for(const a of d.answers){
      const li = document.createElement("li");
      let pctHtml;
      if(a.pct == null){
        pctHtml = `<span class="ans-pct na">--</span>`;
      }else{
        const cls = a.pct >= 0 ? "pos" : "neg";
        const sign = a.pct > 0 ? "+" : "";
        pctHtml = `<span class="ans-pct ${cls}">${sign}${a.pct.toFixed(1)}%</span>`;
      }
      li.innerHTML = `${pctHtml}<span class="ans-name" data-code="${esc(a.code)}">${esc(a.company)}(${esc(a.code)})</span>${a.note ? `<span style="color:var(--sub);font-size:11.5px">${esc(a.note)}</span>` : ""}`;
      anList.appendChild(li);
    }
  }else{
    anBlock.hidden = true;
  }
}

/* ---------- 銘柄ページ ---------- */
async function loadStock(code){
  let data = null;
  if(API_URL){
    try{
      const res = await fetch(`${API_URL}${API_URL.includes("?") ? "&" : "?"}code=${encodeURIComponent(code)}`);
      data = await res.json();
    }catch(e){ data = null; }
  }else{
    data = SAMPLE.stocks[code] ||
      { code, company: ((DATA && DATA.items.find(i=>i.code===code)) || {}).company || "", items: DATA ? DATA.items.filter(i=>i.code===code) : [] };
  }
  if(!data) data = { code, company:"", items:[] };

  document.getElementById("stock-code").textContent = data.code;
  document.getElementById("stock-name").textContent = data.company || "銘柄情報";
  const capTxt = data.extras && data.extras.capOku != null ? `時価総額 約${fmtCap(data.extras.capOku)} / ` : "";
  document.getElementById("stock-stats").textContent =
    (capTxt || data.items.length) ? `${capTxt}保存済み開示 ${data.items.length}件` : "";
  renderSupplyDemand(data.extras);

  // 文脈行: 業績修正の連続性を読む
  const ctx = buildContext(data.items);
  const ctxEl = document.getElementById("stock-context");
  if(ctx){ ctxEl.hidden = false; ctxEl.textContent = ctx; } else { ctxEl.hidden = true; }

  renderList(
    document.getElementById("stock-timeline"),
    document.getElementById("stock-notice"),
    data.items,
    "この銘柄の保存済み開示はまだありません。"
  );
}

function fmtCap(oku){
  return oku >= 10000 ? (oku/10000).toFixed(1).replace(/\.0$/,"") + "兆円" : Math.round(oku).toLocaleString() + "億円";
}

function fmtShares(n){
  if(n >= 1e8) return (n/1e8).toFixed(1).replace(/\.0$/,"") + "億株";
  if(n >= 1e4) return Math.round(n/1e4).toLocaleString() + "万株";
  return n.toLocaleString() + "株";
}

/* 信用残・空売り残高(J-Quants) */
function renderSupplyDemand(ex){
  const el = document.getElementById("supply-demand");
  el.innerHTML = "";
  const hasMargin = ex && ex.margin;
  const hasShort = ex && ex.shortPositions && ex.shortPositions.length;
  if(!hasMargin && !hasShort){ el.hidden = true; return; }
  el.hidden = false;

  let html = `<div class="sd-head">SUPPLY/DEMAND ── 需給(J-Quants)</div>`;
  if(hasMargin){
    const m = ex.margin;
    const d = (v, p) => {
      if(p == null || !p) return "";
      const diff = ((v - p) / p) * 100;
      const cls = diff >= 0 ? "pos" : "neg";
      return `<span class="delta ${cls}">${diff >= 0 ? "+" : ""}${diff.toFixed(1)}%</span>`;
    };
    html += `<div class="sd-row"><span class="sd-label">信用買い残</span><span class="sd-val">${fmtShares(m.long)}${d(m.long, m.longPrev)}</span></div>`;
    html += `<div class="sd-row"><span class="sd-label">信用売り残</span><span class="sd-val">${fmtShares(m.short)}${d(m.short, m.shortPrev)}</span></div>`;
    html += `<div class="sd-row"><span class="sd-label"></span><span style="font-size:11px;color:var(--sub)">${esc(m.date)}時点(週次)</span></div>`;
  }
  if(hasShort){
    html += `<div class="sd-row" style="margin-top:4px"><span class="sd-label">空売り残高</span><span style="font-size:11px;color:var(--sub)">残高割合0.5%以上の報告者</span></div>`;
    for(const s of ex.shortPositions){
      html += `<div class="sd-row" style="padding-left:98px;flex-wrap:nowrap"><span class="sd-val" style="flex:none">${s.ratio.toFixed(2)}%</span><span class="sd-short-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.name)}</span></div>`;
    }
  }
  el.innerHTML = html;
}

/** 「3回連続の上方修正」のような文脈を生成(新しい順の配列を受ける) */
function buildContext(items){
  const revs = items.filter(i => i.revPct != null);
  if(revs.length === 0){
    const highs = items.filter(i => i.impact === "high").length;
    return highs >= 2 ? `直近${items.length}件中、インパクト大の開示が${highs}件` : "";
  }
  let up = 0, down = 0;
  for(const r of revs){
    if(r.revPct > 0 && down === 0) up++;
    else if(r.revPct < 0 && up === 0) down++;
    else break;
  }
  if(up >= 2) return `${up}回連続の上方修正 — 会社計画の保守性が続いているとみられる`;
  if(down >= 2) return `${down}回連続の下方修正 — 業績モメンタムに注意`;
  if(revs.length === 1) return revs[0].revPct > 0 ? "直近開示で上方修正" : "直近開示で下方修正";
  const ups = revs.filter(r=>r.revPct>0).length;
  return `保存済みの業績修正${revs.length}件中、上方${ups}件・下方${revs.length-ups}件`;
}

/* ---------- ルーティング(#/stock/XXXX) ---------- */
function route(){
  const m = location.hash.match(/^#\/stock\/([0-9A-Z]{4,5})$/);
  const home = document.getElementById("view-home");
  const stock = document.getElementById("view-stock");
  const chips = document.getElementById("chips");
  if(m){
    home.hidden = true; stock.hidden = false; chips.style.display = "none";
    loadStock(m[1]);
    window.scrollTo(0, 0);
  }else{
    stock.hidden = true; home.hidden = false; chips.style.display = "";
  }
}
window.addEventListener("hashchange", route);

/* ---------- イベント ---------- */
document.getElementById("chips").addEventListener("click", e=>{
  const btn = e.target.closest(".chip");
  if(!btn) return;
  document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed","false"));
  btn.setAttribute("aria-pressed","true");
  render(btn.dataset.filter);
});

document.addEventListener("click", e=>{
  const codeBtn = e.target.closest("[data-code]");
  if(codeBtn){ location.hash = `#/stock/${codeBtn.dataset.code}`; }
});

document.getElementById("back-btn").addEventListener("click", ()=>{ location.hash = ""; });
const mast = document.getElementById("masthead");
mast.addEventListener("click", ()=>{ location.hash = ""; });
mast.addEventListener("keydown", e=>{ if(e.key==="Enter") location.hash = ""; });

/* ---------- 起動 ---------- */
async function boot(){
  if(API_URL){
    try{
      const res = await fetch(API_URL);
      DATA = await res.json();
      if(!DATA || !Array.isArray(DATA.items)) DATA = SAMPLE;
    }catch(e){
      DATA = SAMPLE;
    }
  }else{
    DATA = SAMPLE;
  }
  renderDigest();
  render("all");
  route();
}
boot();
</script>
